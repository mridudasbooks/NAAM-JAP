    :root {

      --gold: #C9A84C;
      --gold-light: #E8D5A3;
      --bg: #FCF7F0;
      --surface: #FFFFFF;
      --text: #2D1B0E;
      --text-muted: #6B5D48;
      --border: #E7DCC8;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 16px;
      --font: 'Georgia', 'Noto Serif', serif;
    }
    [data-theme="dark"] {
      --bg: #1A1410;
      --surface: #2A1F18;
      --text: #F5E6D3;
      --text-muted: #B8A590;
      --border: #4A3528;
      --shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    [data-theme="sepia"] {
      --bg: #F4ECD8;
      --surface: #FAF3E0;
      --text: #3D3226;
      --text-muted: #6B5D48;
      --border: #D4C4A8;

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {

      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;

    #app {

      margin: 0 auto;
      padding: 16px 16px 80px;
      background: var(--bg);
      min-height: 100vh;

      padding-bottom: 16px;

      font-weight: 700;
      color: var(--primary);
      letter-spacing: 2px;

    header .subtitle {
      font-size: 0.9rem;
      color: var(--gold);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    /* Navigation */
    nav {
      display: flex;
      gap: 4px;
      margin: 16px 0;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: var(--shadow);
      overflow-x: auto;

      padding: 10px 8px;
      border: none;
      background: transparent;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: var(--font);

    .nav-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(139,26,26,0.3);
    }
    .nav-btn:active { transform: scale(0.96); }
    /* Views */
    .view { display: none; animation: fadeIn 0.3s ease; }
    .view.active { display: block; }
    @keyframes fadeIn {

      text-align: center;
      box-shadow: var(--shadow);

    .stat-label {

      color: var(--text-muted);

    .welcome-card {

      background: var(--surface);
      color: var(--text);

    .slider {

    .slider:before {

// ==================== APP STATE ====================
let state = {
  entries: [],
  mahima: [],
  settings: {
    userName: '',
    darkMode: false,
    language: 'en',
    fontSize: 18
  }
};

// ==================== INIT ====================
function init() {
  state.entries = Storage.get('naamJaapEntries', []);
  state.settings = Storage.get('naamJaapSettings', state.settings);
  state.mahima = Storage.get('naamJaapMahima', DEFAULT_MAHIMA);

  applySettings();
  renderDashboard();
  renderRegister();
  renderMahimaList();
  bindEvents();
}

function bindEvents() {
  // Navigation
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const view = this.dataset.view;
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(`view-${view}`).classList.add('active');
    });
  });

  // Register
  document.getElementById('add-entry-btn').addEventListener('click', addEntry);
  document.getElementById('export-csv-btn').addEventListener('click', exportCSV);
  document.getElementById('export-pdf-btn').addEventListener('click', exportPDF);
  // Mahima
  document.getElementById('add-mahima-btn').addEventListener('click', addMahima);
  document.getElementById('mahima-search').addEventListener('input', filterMahima);
  document.getElementById('close-reader-btn').addEventListener('click', closeReader);

  // Settings
  document.getElementById('user-name-input').addEventListener('input', function(e) {
    state.settings.userName = e.target.value;
    Storage.set('naamJaapSettings', state.settings);
    updateDashboardName();
  });
  document.getElementById('dark-mode-toggle').addEventListener('change', function(e) {
    state.settings.darkMode = e.target.checked;
    Storage.set('naamJaapSettings', state.settings);
    applyTheme();
  });
  document.getElementById('language-select').addEventListener('change', function(e) {
    state.settings.language = e.target.value;
    Storage.set('naamJaapSettings', state.settings);
    renderDashboard();
    renderRegister();
  });
  document.getElementById('font-size-slider').addEventListener('input', function(e) {
    state.settings.fontSize = parseInt(e.target.value);
    Storage.set('naamJaapSettings', state.settings);
    document.documentElement.style.fontSize = state.settings.fontSize + 'px';
  });
  document.getElementById('reset-data-btn').addEventListener('click', resetAll);

  // Reader controls
  document.getElementById('font-decrease').addEventListener('click', () => changeReaderFont(-2));
  document.getElementById('font-increase').addEventListener('click', () => changeReaderFont(2));
  document.getElementById('theme-toggle-reader').addEventListener('click', toggleReaderTheme);

  // Register table event delegation for edits and deletes
  document.getElementById('register-body').addEventListener('change', function(e) {
    if (e.target.classList.contains('edit-today')) {
      const idx = parseInt(e.target.dataset.index);
      const newVal = parseInt(e.target.value) || 0;
      state.entries[idx].todayJaap = newVal;
      Storage.set('naamJaapEntries', state.entries);
      // Re-render the whole table to update running totals
      renderRegister();
      renderDashboard();
    }
  });

  document.getElementById('register-body').addEventListener('click', function(e) {
    if (e.target.classList.contains('delete-btn')) {
      const idx = parseInt(e.target.dataset.index);
      if (confirm('Delete this entry?')) {
        state.entries.splice(idx, 1);
        Storage.set('naamJaapEntries', state.entries);
        renderRegister();
        renderDashboard();
      }
    }
  });
}

// ==================== SETTINGS APPLICATION ====================
function applySettings() {
  applyTheme();
  document.getElementById('user-name-input').value = state.settings.userName || '';
  document.getElementById('dark-mode-toggle').checked = state.settings.darkMode;
  document.getElementById('language-select').value = state.settings.language || 'en';
  document.getElementById('font-size-slider').value = state.settings.fontSize || 18;
  document.documentElement.style.fontSize = (state.settings.fontSize || 18) + 'px';
  updateDashboardName();
}

function applyTheme() {
  const theme = state.settings.darkMode ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', theme);
}

function updateDashboardName() {
  const name = state.settings.userName || 'Guest';
  document.getElementById('user-name-display').textContent = name;
}

// ==================== DASHBOARD ====================
function renderDashboard() {
  const totalDays = state.entries.length;
  const totalJaap = state.entries.reduce((sum, e) => sum + e.todayJaap, 0);
  document.getElementById('total-days').textContent = totalDays;
  document.getElementById('total-jaap').textContent = totalJaap;

  const today = new Date().toISOString().slice(0,10);
  const todayEntry = state.entries.find(e => e.date === today);
  document.getElementById('today-entry-display').textContent = todayEntry ? `${todayEntry.todayJaap} jaap` : 'No entry yet';
  updateDashboardName();
}

// ==================== REGISTER ====================
function renderRegister() {
  const tbody = document.getElementById('register-body');
  tbody.innerHTML = '';
  const sorted = [...state.entries].sort((a,b) => a.date.localeCompare(b.date));
  if (sorted.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">No entries yet</td></tr>';
    return;
  }
  let running = 0;
  sorted.forEach((entry, index) => {
    running += entry.todayJaap;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${entry.date}</td>
      <td>${index + 1}</td>
      <td><input type="number" value="${entry.todayJaap}" data-index="${index}" class="edit-today" min="0"></td>
      <td>${running}</td>
      <td><button class="delete-btn" data-index="${index}">­¤Śæ’ĖÅ</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function addEntry() {
  const input = document.getElementById('today-jaap-input');
  const value = parseInt(input.value);
  if (isNaN(value) || value < 0) { alert('Enter a valid number'); return; }
  const today = new Date().toISOString().slice(0,10);
  const existing = state.entries.find(e => e.date === today);
  if (existing) {
    existing.todayJaap += value;
  } else {
    state.entries.push({ date: today, todayJaap: value });
  }
  Storage.set('naamJaapEntries', state.entries);
  input.value = '';
  renderRegister();
  renderDashboard();
}

// ==================== MAHIMA ====================
function renderMahimaList(filter = '') {
  const container = document.getElementById('mahima-list');
  const list = state.mahima.filter(item =>
    item.title.toLowerCase().includes(filter.toLowerCase()) ||
    item.content.toLowerCase().includes(filter.toLowerCase())
  );
  if (list.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem;">No Mahima points found</div>';
    return;
  }
  container.innerHTML = list.map(item => `
    <div class="mahima-item" data-id="${item.id}">
      <h3>${item.title}</h3>
      <p>${item.content}</p>
      <div class="mahima-actions">
        <button class="favorite-btn" data-id="${item.id}">${item.favorite ? 'ŌØż’ĖÅ' : '­¤żŹ'}</button>
        <button class="share-btn" data-id="${item.id}">­¤ōż</button>
        <button class="copy-btn" data-id="${item.id}">­¤ōŗ</button>
        <button class="read-btn" data-id="${item.id}">­¤ō¢ Read</button>
        <button class="edit-btn" data-id="${item.id}">Ō£Å’ĖÅ</button>
        <button class="delete-mahima-btn" data-id="${item.id}">­¤Śæ’ĖÅ</button>
      </div>
    </div>
  `).join('');

  // Attach event listeners dynamically
  container.querySelectorAll('.favorite-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = parseInt(this.dataset.id);
      const item = state.mahima.find(i => i.id === id);
      if (item) {
        item.favorite = !item.favorite;
        Storage.set('naamJaapMahima', state.mahima);
        renderMahimaList(document.getElementById('mahima-search').value);
      }
    });
  });
  container.querySelectorAll('.share-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = parseInt(this.dataset.id);
      const item = state.mahima.find(i => i.id === id);
      if (item && navigator.share) {
        navigator.share({ title: item.title, text: item.content });
      } else {
        alert('Share not supported or no item found');
      }
    });
  });
  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = parseInt(this.dataset.id);
      const item = state.mahima.find(i => i.id === id);
      if (item) {
        navigator.clipboard.writeText(`${item.title}\n\n${item.content}`).then(() => alert('Copied!'));
      }
    });
  });
  container.querySelectorAll('.read-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = parseInt(this.dataset.id);
      openReader(id);
    });
  });
  container.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = parseInt(this.dataset.id);
      editMahima(id);
    });
  });
  container.querySelectorAll('.delete-mahima-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = parseInt(this.dataset.id);
      if (confirm('Delete this Mahima point?')) {
        state.mahima = state.mahima.filter(i => i.id !== id);
        Storage.set('naamJaapMahima', state.mahima);
        renderMahimaList(document.getElementById('mahima-search').value);
      }
    });
  });
}

function filterMahima() {
  const query = document.getElementById('mahima-search').value;
  renderMahimaList(query);
}

function addMahima() {
  const title = prompt('Enter title:');
  if (!title) return;
  const content = prompt('Enter content:');
  if (!content) return;
  const newId = state.mahima.length ? Math.max(...state.mahima.map(i => i.id)) + 1 : 1;
  state.mahima.push({ id: newId, title, content, favorite: false });
  Storage.set('naamJaapMahima', state.mahima);
  renderMahimaList(document.getElementById('mahima-search').value);
}

function editMahima(id) {
  const item = state.mahima.find(i => i.id === id);
  if (!item) return;
  const newTitle = prompt('Edit title:', item.title);
  if (newTitle === null) return;
  const newContent = prompt('Edit content:', item.content);
  if (newContent === null) return;
  item.title = newTitle;
  item.content = newContent;
  Storage.set('naamJaapMahima', state.mahima);
  renderMahimaList(document.getElementById('mahima-search').value);
}
// ==================== READER ====================
let readerFontSize = 18;
let readerTheme = 'light';

function openReader(id) {
  const item = state.mahima.find(i => i.id === id);
  if (!item) return;
  document.getElementById('mahima-list').style.display = 'none';
  document.getElementById('mahima-reader').style.display = 'block';
  const contentDiv = document.getElementById('reader-content');
  contentDiv.innerHTML = `<h1>${item.title}</h1><p>${item.content}</p>`;
  contentDiv.style.fontSize = readerFontSize + 'px';
  // Apply reader theme
  if (readerTheme === 'dark') {
    contentDiv.style.color = '#f5e6d3';
    contentDiv.style.background = '#1c1410';
  } else if (readerTheme === 'sepia') {
    contentDiv.style.color = '#3d3226';
    contentDiv.style.background = '#f4ecd8';
  } else {
    contentDiv.style.color = '';
    contentDiv.style.background = '';
  }
}

function closeReader() {
  document.getElementById('mahima-reader').style.display = 'none';
  document.getElementById('mahima-list').style.display = 'block';
}

function changeReaderFont(delta) {
  readerFontSize = Math.max(12, Math.min(32, readerFontSize + delta));
  document.getElementById('reader-content').style.fontSize = readerFontSize + 'px';
}

function toggleReaderTheme() {
  const themes = ['light', 'sepia', 'dark'];
  const currentIdx = themes.indexOf(readerTheme);
  readerTheme = themes[(currentIdx + 1) % themes.length];
  // Update current reader if open
  const contentDiv = document.getElementById('reader-content');
  if (contentDiv) {
    if (readerTheme === 'dark') {
      contentDiv.style.color = '#f5e6d3';
      contentDiv.style.background = '#1c1410';
    } else if (readerTheme === 'sepia') {
      contentDiv.style.color = '#3d3226';
      contentDiv.style.background = '#f4ecd8';
    } else {
      contentDiv.style.color = '';
      contentDiv.style.background = '';
    }
  }
}

// ==================== PDF EXPORT ====================
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const user = state.settings.userName || 'Guest';
  const totalJaap = state.entries.reduce((sum, e) => sum + e.todayJaap, 0);
  const totalDays = state.entries.length;

  doc.setFontSize(16);
  doc.setTextColor(139, 26, 26);
  doc.text('MRIDUDAS BOOKS', 105, 20, { align: 'center' });
  doc.setFontSize(14);
  doc.setTextColor(201, 168, 76);
  doc.text('NAAM JAP REGISTER', 105, 28, { align: 'center' });
  doc.setFontSize(10);
  doc.setTextColor(50);
  doc.text('Creator: Nilesh Dhundhalva', 105, 36, { align: 'center' });

  doc.setFontSize(11);
  doc.setTextColor(0);
  doc.text(`User: ${user}`, 14, 48);
  doc.text(`Total Jaap: ${totalJaap}`, 14, 54);
  doc.text(`Total Days: ${totalDays}`, 14, 60);

  const tableData = state.entries.sort((a,b) => a.date.localeCompare(b.date)).map((e, i) => {
    const running = state.entries.slice(0, i+1).reduce((s, x) => s + x.todayJaap, 0);
    return [e.date, i+1, e.todayJaap, running];
  });

  doc.autoTable({
    startY: 66,
    head: [['Date', 'Day', "Today's Jaap", 'Total Jaap']],
    body: tableData,
    theme: 'striped',
    headStyles: { fillColor: [139, 26, 26], textColor: [255,255,255] },
    styles: { fontSize: 8 },
    didDrawPage: function(data) {
      const now = new Date().toLocaleString();
      doc.setFontSize(8);
      doc.setTextColor(100);
      doc.text(`Generated on: ${now}`, 14, 285);
      doc.text('MRIDUDAS BOOKS', 105, 285, { align: 'center' });
    }
  });

  doc.save('naam_jap_register.pdf');
}

// ==================== CSV EXPORT ====================
function exportCSV() {
  const sorted = [...state.entries].sort((a,b) => a.date.localeCompare(b.date));
  let csv = 'Date,Day,Today\'s Jaap,Total Jaap\n';
  let running = 0;
  sorted.forEach((e, i) => {
    running += e.todayJaap;
    csv += `${e.date},${i+1},${e.todayJaap},${running}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'naam_jap_register.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ==================== RESET ====================
function resetAll() {
  if (confirm('Delete all data? This cannot be undone.')) {
    localStorage.clear();
    state.entries = [];
    state.mahima = DEFAULT_MAHIMA;
    state.settings = { userName: '', darkMode: false, language: 'en', fontSize: 18 };
    Storage.set('naamJaapEntries', state.entries);
    Storage.set('naamJaapMahima', state.mahima);
    Storage.set('naamJaapSettings', state.settings);
    init();
  }
}

// ==================== BOOT ====================
init();
